<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expenses</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="Assets/Icons/app-favicon.svg">
  <link href="CSS/ui.css" rel="stylesheet">
  <link href="CSS/ui-theme.css" rel="stylesheet">
  <link href="CSS/ui-improvements.css" rel="stylesheet">
  <link href="CSS/ui-shell.css" rel="stylesheet">
  <script src="JS/common-ui.js"></script>
  <script src="JS/ui-shell.js"></script>
</head>

<body class="page-expenses">
<div class="container page-shell">
  <section class="hero">
    <h2 class="hero-title">Daily Expenses</h2>
    <p class="hero-sub">Track your daily spending and keep your monthly outflow in control.</p>
  </section>

  <section class="panel">
    <div class="panel-head">
      <h3 class="panel-title"><i class="bi bi-wallet2"></i> Add / Edit Expense</h3>
    </div>
    <div class="panel-body">
      <form id="expenseForm" class="stack-gap">
        <input type="hidden" id="editExpenseId">

        <div class="row g-2">
          <div class="col-6">
            <label class="form-label">Date</label>
            <input id="expenseDate" type="date" class="form-control">
          </div>
          <div class="col-6">
            <label class="form-label">Amount</label>
            <input id="expenseAmount" type="number" step="0.01" min="0" class="form-control" placeholder="0.00">
          </div>
        </div>

        <div class="row g-2">
          <div class="col-6">
            <label class="form-label">Category</label>
            <select id="expenseCategory" class="form-select">
              <option value="Food">Food</option>
              <option value="Travel">Travel</option>
              <option value="Bills">Bills</option>
              <option value="Shopping">Shopping</option>
              <option value="Health">Health</option>
              <option value="EMI">EMI</option>
              <option value="Other" selected>Other</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label">Payment Mode</label>
            <select id="expensePaymentMode" class="form-select">
              <option value="Cash">Cash</option>
              <option value="UPI">UPI</option>
              <option value="Card">Card</option>
              <option value="NetBanking">NetBanking</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div>
          <label class="form-label">Note (optional)</label>
          <input id="expenseNote" class="form-control" placeholder="Short note">
        </div>

        <button class="btn btn-primary w-100" type="submit">Save Expense</button>
      </form>
    </div>
  </section>

  <section class="panel mt-3">
    <div class="panel-head">
      <h3 class="panel-title"><i class="bi bi-bar-chart-line"></i> Expense Snapshot</h3>
    </div>
    <div class="panel-body tight">
      <div class="adv-grid">
        <div class="stat-card"><div class="stat-label">Today</div><div class="stat-value" id="expToday">₹0.00</div></div>
        <div class="stat-card"><div class="stat-label">This Month</div><div class="stat-value" id="expMonth">₹0.00</div></div>
        <div class="stat-card"><div class="stat-label">Top Category</div><div class="tiny-label" id="expTopCategory">-</div></div>
        <div class="stat-card"><div class="stat-label">Entries</div><div class="stat-value" id="expEntries">0</div></div>
      </div>
    </div>
  </section>

  <section class="list-shell mt-3">
    <div class="section-title">Recent Expenses</div>
    <div id="expenseList"></div>
  </section>
</div>

<script src="JS/Db.js"></script>
<script src="JS/App.js"></script>
<script src="JS/Settings.js"></script>
<script src="JS/Expenses.js"></script>
<script>
  (function () {
    const uid = localStorage.getItem("activeUserId");
    if (!uid) {
      window.location.href = "./client/profile.html";
      return;
    }
    const boot = async () => {
      if (typeof window.startApp === "function") await window.startApp();
      if (typeof initExpenseForm === "function") initExpenseForm();
      if (typeof loadExpenses === "function") loadExpenses();
    };
    boot().catch(err => console.error("Expenses bootstrap failed", err));
  })();
</script>

</body>
</html>
