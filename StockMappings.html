<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock Mappings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="Assets/Icons/Favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="CSS/ui.css" rel="stylesheet">
  <link href="CSS/ui-theme.css" rel="stylesheet">
  <link href="CSS/ui-improvements.css" rel="stylesheet">
</head>
<body class="page-settings">

<div class="app-header">
  <div class="app-title">Stock Mappings</div>
  <div class="d-flex gap-2">
    <button onclick="toggleTheme()" class="btn btn-sm btn-light" title="Toggle Theme">
      <i class="bi bi-moon-stars"></i>
    </button>
    <a href="Settings.html" class="btn btn-sm btn-light" title="Settings">
      <i class="bi bi-gear"></i>
    </a>
  </div>
</div>

<div class="container page-shell">
  <section class="hero">
    <h2 class="hero-title">Stock Name to NSE Ticker</h2>
    <p class="hero-sub">Map each app stock name once. Transactions can keep simple names while prices use NSE tickers.</p>
  </section>

  <section class="panel">
    <div class="panel-head">
      <h3 class="panel-title"><i class="bi bi-link-45deg"></i> Add / Update Mapping</h3>
    </div>
    <div class="panel-body">
      <form id="mappingForm" class="stack-gap">
        <div>
          <label class="form-label">Stock Name</label>
          <input id="mapStock" class="form-control" placeholder="Example: Infosys">
        </div>
        <div>
          <label class="form-label">NSE Ticker</label>
          <input id="mapTicker" class="form-control" placeholder="Example: NSE:INFY">
        </div>
        <div class="d-flex align-items-center gap-2">
          <input id="mapEnabled" class="form-check-input mt-0" type="checkbox" checked>
          <label for="mapEnabled" class="form-label m-0">Enabled</label>
        </div>
        <button class="btn btn-primary w-100" type="submit">Save Mapping</button>
      </form>
    </div>
  </section>

  <section class="panel">
    <div class="panel-head">
      <h3 class="panel-title"><i class="bi bi-list-ul"></i> Mapping List</h3>
    </div>
    <div class="panel-body tight">
      <div id="mappingList"></div>
    </div>
  </section>
</div>

<nav class="bottom-nav">
  <a href="index.html"><i class="bi bi-grid"></i>Home</a>
  <a href="Transactions.html"><i class="bi bi-arrow-left-right"></i>Txn</a>
  <a href="Holdings.html"><i class="bi bi-briefcase"></i>Hold</a>
  <a href="Pnl.html"><i class="bi bi-bar-chart"></i>P/L</a>
  <a href="Insights.html"><i class="bi bi-lightbulb"></i>Insights</a>
</nav>

<script src="JS/Db.js"></script>
<script src="JS/App.js"></script>
<script src="JS/Settings.js"></script>
<script src="JS/StockMappings.js"></script>
<script>
  function toggleTheme() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
  }
  if (localStorage.getItem("theme") === "dark") document.body.classList.add("dark");
  (function(){
    const uid = localStorage.getItem("activeUserId");
    if(!uid){ window.location.href = "./client/profile.html"; return; }
    openDB().then(seedSettings).then(initStockMappingsPage);
  })();
</script>
</body>
</html>
